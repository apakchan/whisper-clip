<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper Clip Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>Whisper Clip 设置</h1>

    <div class="field">
      <label for="api-key">Groq API Key</label>
      <input type="password" id="api-key" placeholder="gsk_..." />
      <span id="api-status" class="status"></span>
    </div>

    <div class="field">
      <label for="mic-device">麦克风设备</label>
      <select id="mic-device">
        <option value="">系统默认</option>
      </select>
    </div>

    <div class="field">
      <label for="model">语音识别模型</label>
      <select id="model">
        <option value="whisper-large-v3-turbo">whisper-large-v3-turbo（快速）</option>
        <option value="whisper-large-v3">whisper-large-v3（高精度）</option>
      </select>
    </div>

    <div class="field">
      <label for="prompt">识别提示词</label>
      <textarea id="prompt" rows="3" placeholder="描述你的身份和常用词汇，帮助模型更准确识别..."></textarea>
      <span class="hint">提示模型你可能说的内容，例如技术术语、专业词汇等</span>
    </div>

    <div class="field">
      <label>快捷键</label>
      <span class="hotkey-display">⌘ ⇧ Space（按住录音）</span>
    </div>

    <button id="save-btn">保存</button>
    <span id="save-status"></span>
  </div>
  <script src="main.js"></script>
</body>
</html>
